<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Projects-Hours{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f5f7fb; }
        .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
        .card { border: none; box-shadow: 0 2px 6px rgba(0,0,0,0.04); border-radius: 10px; }
        .badge-status-planning  { background: #6c757d; }
        .badge-status-active    { background: #198754; }
        .badge-status-on_hold   { background: #fd7e14; }
        .badge-status-completed { background: #0d6efd; }
        .badge-status-cancelled { background: #dc3545; }
        .badge-priority-low    { background: #adb5bd; }
        .badge-priority-medium { background: #0dcaf0; color:#000;}
        .badge-priority-high   { background: #fd7e14; }
        .badge-priority-urgent { background: #dc3545; }
        .avatar {
            display:inline-flex; align-items:center; justify-content:center;
            width: 32px; height: 32px; border-radius: 50%;
            color:#fff; font-weight:600; font-size:0.85rem;
        }
        .timeline-bar {
            position:absolute; height: 28px; top: 6px; border-radius: 6px;
            color:#fff; padding: 4px 8px; font-size: 0.78rem; overflow:hidden;
            white-space: nowrap; text-overflow: ellipsis;
        }
        .timeline-row { position: relative; height: 40px; border-bottom: 1px solid #eee; }
        .timeline-today {
            position: absolute; top:0; bottom:0; width:2px;
            background: #dc3545; z-index: 5;
        }
        .clock-pulse {
            display:inline-block; width:8px; height:8px; border-radius:50%;
            background:#198754; margin-right:6px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%{opacity:1;} 50%{opacity:0.3;} 100%{opacity:1;} }
        .update-card { border-left: 4px solid #0d6efd; }
        .update-card.kind-blocker  { border-left-color: #dc3545; }
        .update-card.kind-decision { border-left-color: #198754; }
        .update-card.kind-question { border-left-color: #fd7e14; }
        .update-card.kind-status   { border-left-color: #0dcaf0; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/"><i class="bi bi-kanban"></i> Projects-Hours</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/timeline"><i class="bi bi-bar-chart-steps"></i> Timeline</a></li>
                <li class="nav-item"><a class="nav-link" href="/team"><i class="bi bi-people"></i> Team</a></li>
                <li class="nav-item"><a class="nav-link" href="/hours"><i class="bi bi-stopwatch"></i> Hours</a></li>
            </ul>
            <a class="btn btn-primary" href="/projects/new"><i class="bi bi-plus-circle"></i> New Project</a>
        </div>
    </div>
</nav>
<main class="container-fluid py-4">
    {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
