{% extends "base.html" %}
{% block title %}New Project — Projects-Hours{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h1 class="h3 mb-4"><i class="bi bi-plus-circle"></i> New Project</h1>
        <form method="post" action="/projects" class="card p-4">
            <div class="mb-3">
                <label class="form-label">Project name *</label>
                <input type="text" name="name" required class="form-control" placeholder="e.g. Mobile App Redesign">
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Code</label>
                    <input type="text" name="code" class="form-control" placeholder="MOB-RE">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        <option value="planning">Planning</option>
                        <option value="active">Active</option>
                        <option value="on_hold">On Hold</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Priority</label>
                    <select name="priority" class="form-select">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                        <option value="urgent">Urgent</option>
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Purpose <span class="text-muted small">(the "why")</span></label>
                <textarea name="purpose" class="form-control" rows="2" placeholder="Why are we doing this project?"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4" placeholder="What's the scope, deliverables, success criteria?"></textarea>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Start date</label>
                    <input type="date" name="start_date" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Target end date</label>
                    <input type="date" name="target_end_date" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Color</label>
                    <input type="color" name="color" class="form-control form-control-color" value="#0d6efd">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Owner</label>
                <select name="owner_id" class="form-select">
                    <option value="">— No owner —</option>
                    {% for m in members %}
                    <option value="{{ m.id }}">{{ m.name }}{% if m.role %} ({{ m.role }}){% endif %}</option>
                    {% endfor %}
                </select>
                {% if not members %}
                <div class="form-text">No team members yet. <a href="/team">Add some on the Team page</a>.</div>
                {% endif %}
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-primary"><i class="bi bi-check-circle"></i> Create Project</button>
                <a href="/" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
